apiVersion: apps/v1
kind: Deployment
metadata:
  name:  ai-deployment
  labels:
    name: ai-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-server
  template:
    metadata:
      labels:
        app: ai-server
    spec:
      containers:
      - image: ai-orchestration
        name:  ai-server
        resources:
          limits: 
            cpu: "500m"
            memory: "256M"
          requests:
            cpu: 100m
            memory: 128M
        livenessProbe:
          httpGet:
            path: /api/ai/healthz
            port: 3000
          initialDelaySeconds: 90
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/ai/readyz
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10
        env:
          - name: MISTRAL_API_KEY
            valueFrom:
              secretKeyRef:
                name: ai-secret
                key: MISTRAL_API_KEY
        ports:
        - containerPort: 3000
          name: ai-server-port